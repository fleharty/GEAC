name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build and push linux/amd64 Docker image ───────────────────────────────────
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_LC }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  native-binaries:
    name: Native binary (macos-arm64)
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: brew install htslib pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: tar -czf geac-macos-arm64.tar.gz -C target/release geac

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: geac-macos-arm64.tar.gz

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: [docker, native-binaries]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Compute checksums and update formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"

          # Download macos-arm64 binary and compute SHA256
          gh release download "${TAG}" --pattern "geac-macos-arm64.tar.gz" --repo "${{ github.repository }}"
          SHA256_MACOS_ARM64=$(sha256sum geac-macos-arm64.tar.gz | awk '{print $1}')

          # Source tarball SHA256 — must use the exact URL Homebrew will fetch
          curl -fsSL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz" -o source.tar.gz
          SOURCE_SHA256=$(sha256sum source.tar.gz | awk '{print $1}')

          # Generate the formula from the template, substituting version and SHA256s
          sed \
            -e "s/FORMULA_VERSION/${VERSION}/g" \
            -e "s/SHA256_MACOS_ARM64/${SHA256_MACOS_ARM64}/g" \
            -e "s/SHA256_SOURCE/${SOURCE_SHA256}/g" \
            homebrew/Formula/geac.rb > geac_final.rb

          # Push to the homebrew-geac tap repo
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/fleharty/homebrew-geac.git" tap
          mkdir -p tap/Formula
          cp geac_final.rb tap/Formula/geac.rb
          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/geac.rb
          git diff --cached --quiet || git commit -m "geac ${VERSION}"
          git push
